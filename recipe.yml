name: torah-os
description: "Vanilla OS Orchid - Torah Edition"
base: ghcr.io/vanilla-os/desktop:2

stages:
  - name: customize
    modules:
      - type: shell
        commands:
          # עדכון והתקנת כלים בסיסיים
          - apt update
          - apt install -y curl ca-certificates sed libfuse2
          
          # התקנת OnlyOffice
          - apt install -y onlyoffice-desktopeditors
          
          # התקנת "זית" (הסרת sudo והרצה אוטומטית)
          - curl -L https://zayitapp.com/download/launch.linux -o /tmp/install_zayit.sh
          - sed -i 's/sudo //g' /tmp/install_zayit.sh
          - chmod +x /tmp/install_zayit.sh
          - DEBIAN_FRONTEND=noninteractive yes "" | bash /tmp/install_zayit.sh
          
          # נעילה: הסרת טרמינל, רשת ודפדפן
          - apt purge -y gnome-terminal xterm network-manager firefox-esr wget curl apx abroot
          
          # ניקוי שאריות
          - apt autoremove -y
          - rm /tmp/install_zayit.sh

      - type: shell
        commands:
          # ביטול הרשאות מנהל למשתמש vanilla ונעילת Root
          - delgroup vanilla sudo || true
          - passwd -l root
